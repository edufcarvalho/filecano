name: filecano

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  APP_NAME: ${APP_NAME:-Filecano API}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://filecano:filecano@database:5432/filecano}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-data:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_BUCKET: ${MINIO_BUCKET:-filecano}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,https://localhost,https://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_SECONDS: ${ACCESS_TOKEN_EXPIRE_SECONDS:-3600}
  ACCESS_TOKEN_REFRESH_GRACE_SECONDS: ${ACCESS_TOKEN_REFRESH_GRACE_SECONDS:-86400}
  SHARED_URL_EXPIRE_SECONDS: ${SHARED_URL_EXPIRE_SECONDS:-604800}
  SHARE_TOKEN_LENGTH: ${SHARE_TOKEN_LENGTH:-8}
  MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-2147483648}
  REDIS_URL: ${REDIS_URL:-redis://:1234@host.docker.internal:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:1234@host.docker.internal:6379/0}
  DATA_RETENTION_POLICY: ${DATA_RETENTION_POLICY:-45}
  WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}

x-backend-depends-on: &backend-depends-on
  database:
    condition: service_healthy
  data:
    condition: service_healthy

x-backend-volumes: &backend-volumes
  - ./backend:/app
  - /app/.venv

services:
  nginx:
    build:
      context: ./nginx
    depends_on:
      back:
        condition: service_healthy
      front:
        condition: service_started
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"

  back:
    build:
      context: ./backend
    working_dir: /app
    environment: *backend-env
    depends_on: *backend-depends-on
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes: *backend-volumes

  worker:
    build:
      context: ./backend
    working_dir: /app
    command: ["celery", "-A", "app.tasks.celery", "worker", "-B", "--loglevel=info"]
    environment:
      <<: *backend-env
      SKIP_MIGRATIONS: "true"
    depends_on:
      <<: *backend-depends-on
      cache:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes: *backend-volumes

  front:
    build:
      context: ./frontend
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-5173}
    depends_on:
      back:
        condition: service_healthy
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  data:
    image: minio/minio:latest
    container_name: filecano-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  database:
    image: postgres:16-alpine
    container_name: filecano-database
    environment:
      POSTGRES_DB: filecano
      POSTGRES_USER: filecano
      POSTGRES_PASSWORD: filecano
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filecano -d filecano"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cache:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: filecano-cache
    environment:
      DFLY_requirepass: ${REDIS_PASSWORD:-1234}
    ulimits:
      memlock: -1
    network_mode: "host"
    volumes:
      - dragonflydata:/data

volumes:
  minio_data:
  postgres_data:
  dragonflydata:
