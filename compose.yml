name: filecano

services:
  back:
    build:
      context: ./backend
    working_dir: /app
    environment:
      APP_NAME: Filecano API
      DATABASE_URL: postgresql+psycopg://filecano:filecano@database:5432/filecano
      MINIO_ENDPOINT: data:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: filecano
      MINIO_SECURE: "false"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      database:
        condition: service_healthy
      data:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./backend:/app
      - /app/.venv

  front:
    build:
      context: ./frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
      VITE_API_URL: http://localhost:8000/api
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: "5173"
    depends_on:
      back:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  data:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: filecano
      POSTGRES_USER: filecano
      POSTGRES_PASSWORD: filecano
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filecano -d filecano"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cache:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    environment:
      DFLY_requirepass: ${REDIS_PASSWORD:-1234}
    ulimits:
      memlock: -1
    network_mode: "host"
    volumes:
      - dragonflydata:/data

volumes:
  minio_data:
  postgres_data:
  dragonflydata:
  
