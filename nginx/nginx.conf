worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  server_tokens off;
  keepalive_timeout 65s;
  client_max_body_size 2g;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  map "$request_method:$uri" $api_auth_limit_key {
    default "";
    ~^POST:/api/v1/users/?$ $binary_remote_addr;
    ~^POST:/api/v1/users/login/?$ $binary_remote_addr;
  }

  map "$request_method:$uri" $api_refresh_limit_key {
    default "";
    ~^POST:/api/v1/users/token/refresh/?$ $binary_remote_addr;
  }

  map "$request_method:$uri" $api_upload_limit_key {
    default "";
    ~^POST:/api/v1/files/?$ $binary_remote_addr;
  }

  map "$request_method:$uri" $api_download_limit_key {
    default "";
    ~^GET:/api/v1/files/[^/]+/?$ $binary_remote_addr;
    ~^GET:/api/v1/files/[^/]+/preview/?$ $binary_remote_addr;
    ~^GET:/api/v1/folders/[^/]+/download/?$ $binary_remote_addr;
    ~^POST:/api/v1/files/download/bulk/?$ $binary_remote_addr;
    ~^GET:/api/v1/share/(?!user/)[^/]+/[^/]+/?$ $binary_remote_addr;
    ~^GET:/api/v1/share/(?!user/)[^/]+/preview/[^/]+/?$ $binary_remote_addr;
  }

  map "$request_method:$uri" $api_public_share_limit_key {
    default "";
    ~^GET:/api/v1/share/(?!user/)[^/]+/?$ $binary_remote_addr;
    ~^GET:/api/v1/share/(?!user/)[^/]+/[^/]+/?$ $binary_remote_addr;
    ~^GET:/api/v1/share/(?!user/)[^/]+/preview/[^/]+/?$ $binary_remote_addr;
  }

  map $request_method $api_mutation_limit_key {
    default "";
    POST $binary_remote_addr;
    PUT $binary_remote_addr;
    PATCH $binary_remote_addr;
    DELETE $binary_remote_addr;
  }

  limit_req_status 429;
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=180r/m;
  limit_req_zone $api_auth_limit_key zone=api_auth:10m rate=10r/m;
  limit_req_zone $api_refresh_limit_key zone=api_refresh:10m rate=30r/m;
  limit_req_zone $api_upload_limit_key zone=api_upload:10m rate=6r/m;
  limit_req_zone $api_download_limit_key zone=api_download:10m rate=60r/m;
  limit_req_zone $api_public_share_limit_key zone=api_public_share:10m rate=90r/m;
  limit_req_zone $api_mutation_limit_key zone=api_mutation:10m rate=30r/m;

  upstream filecano_api {
    server back:8000;
    keepalive 32;
  }

  upstream filecano_frontend {
    server front:5173;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;

    include /etc/nginx/proxy_params;
  }

  server {
    listen 443 ssl;
    listen 443 quic reuseport;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/default.crt;
    ssl_certificate_key /etc/nginx/certs/default.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header QUIC-Status $http3 always;

    include /etc/nginx/proxy_params;
  }
}
