services:
  nginx:
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health && wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  front:
    environment:
      VITE_ALLOWED_HOSTS: localhost,127.0.0.1,front,nginx

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /app
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://nginx
      PLAYWRIGHT_API_URL: http://back:8000
    depends_on:
      nginx:
        condition: service_healthy
      back:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - e2e_node_modules:/app/node_modules
    command: ["sh", "-lc", "npm ci && npx playwright test"]

volumes:
  e2e_node_modules:
